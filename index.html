<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#003366"> 
    <title>Simulador Dietrich - Pagos</title>
    
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="img/icons/icon-192x192.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Simulador">
</head>
<body>

    <div class="app-container">
        <header class="main-header">
            <div class="header-content">
                <img src="img/dietrich.png" alt="Logo Dietrich" class="banner-logo">
                <button id="btn-novedades" class="btn-novedades">
                    <span class="bell-icon">🔔</span> Novedades
                </button>
            </div>
        </header>

        <main class="promo-selection">
            <h1 class="welcome-title">Selecciona tu Plan de Cuotas</h1>
            <p class="welcome-subtitle">Haz clic en la promoción para simular tu tarjeta.</p>

            <div class="buttons-grid">

                <button class="promo-card" id="btn-payway">
                    <div class="card-content">
                        <h2 class="promo-legend">3, 6 y 12 cuotas sin interés</h2>
                        <p class="promo-context">(Payway)</p>
                    </div>
                    <div class="bank-logos-grid">
                        <img src="img/payway/credicoop.png" alt="Credicoop" class="bank-logo-mini">
                        <img src="img/payway/comafi.png" alt="Comafi" class="bank-logo-mini">
                        <img src="img/payway/icbc.png" alt="ICBC" class="bank-logo-mini">
                        <img src="img/payway/provincia.png" alt="Provincia" class="bank-logo-mini">
                        <img src="img/payway/ciudad.png" alt="Ciudad" class="bank-logo-mini">
                        <img src="img/payway/supervielle.png" alt="Supervielle" class="bank-logo-mini">
                        <img src="img/payway/patagonia.png" alt="Patagonia" class="bank-logo-mini">
                    </div>
                </button>

                <button class="promo-card" id="btn-getnet">
                    <div class="card-content">
                        <h2 class="promo-legend">3 y 6 cuotas sin interés</h2>
                        <p class="promo-context">(getnet)</p>
                    </div>
                    <div class="bank-logos-grid logos-4">
                        <img src="img/getnet/santander.png" alt="Santander" class="bank-logo-mini">
                        <img src="img/getnet/macro.png" alt="Macro" class="bank-logo-mini">
                        <img src="img/getnet/bbva.png" alt="BBVA" class="bank-logo-mini">
                        <img src="img/getnet/nacion.png" alt="Banco Nación" class="bank-logo-mini">
                    </div>
                </button>

                <button class="promo-card nave-card" id="btn-nave">
                    <div class="card-content">
                        <h2 class="promo-legend">3, 6, 9 y 12 cuotas sin interés</h2>
                        <p class="promo-context">(Galicia - nave)</p>
                    </div>
                    <div class="bank-logos-grid single-logo">
                        <img src="img/nave/galicia.png" alt="Galicia Nave" class="bank-logo-single">
                    </div>
                </button>

            </div> 
        </main>

        <main class="calculator-section" id="calculator-screen" style="display: none;">
            
            <div class="calc-header">
                <button id="btn-back" class="btn-back">⬅ Volver</button>
                <h2 id="calc-title" class="calc-title">Simulador</h2>
            </div>

            <div class="calc-card">
                <div class="input-group">
                    <label for="monto-input">Monto a Financiar ($)</label>
                   <input type="text" id="monto-input" placeholder="$ 0" inputmode="numeric">
                </div>

                <div class="input-group">
                    <label>Selecciona el Plazo</label>
                    <div class="cuotas-grid" id="cuotas-container">
                        </div>
                </div>

                <div class="input-group slider-group" id="tasa-group" style="display: none;">
                    <div class="slider-labels">
                        <label>Tasa Aplicada: <span id="tasa-display" class="tasa-highlight">0.00%</span></label>
                        <span id="tasa-original-display" class="tasa-original">Lista: 0.00%</span>
                    </div>
                    <input type="range" id="tasa-slider" min="0" max="100" step="0.01" value="0">
                </div>
            </div>

            <div class="result-card" id="result-card" style="display: none;">
                <p class="result-label">Valor de Cuota Mensual</p>
                <h3 class="result-cuota" id="res-cuota">$0</h3>
                
                <div class="result-details">
                    <p>Monto total a pagar por el cliente: <strong id="res-total-cliente">$0</strong></p>
                    
                    <div id="costo-absorbido-container" class="costo-absorbido-row" style="display: none;">
                        <p>Costo total a absorber: <strong id="res-costo-absorbido">$0</strong></p>
                    </div>
                </div>
            </div>

        </main>
    </div> 

    <a href="https://wa.me/5492804006499?text=Hola,%20tengo%20una%20consulta%20sobre%20el%20simulador%20de%20créditos." target="_blank" class="whatsapp-float" aria-label="Consultas por WhatsApp">
        <svg viewBox="0 0 32 32" class="whatsapp-icon">
            <path d="M16.05 2.5a13.45 13.45 0 0 0-11.4 20.62L3 29l6.02-1.58A13.45 13.45 0 1 0 16.05 2.5zm0 24.73a11.23 11.23 0 0 1-5.73-1.57l-.4-.24-4.25 1.12 1.13-4.14-.26-.42a11.22 11.22 0 1 1 9.51 5.25zm6.15-8.4c-.34-.17-2-.99-2.32-1.1s-.55-.17-.78.17-.88 1.1-.11 1.32-.42.22-.8.03a8.96 8.96 0 0 1-2.63-1.62 9.87 9.87 0 0 1-1.82-2.27c-.23-.39-.02-.6.15-.77.16-.15.34-.39.51-.58.17-.19.23-.33.34-.55.11-.22.06-.41-.03-.58s-.78-1.88-1.07-2.58c-.28-.68-.57-.59-.78-.6h-.67c-.22 0-.59.08-.9.41s-1.18 1.16-1.18 2.82 1.21 3.28 1.38 3.5 2.38 3.63 5.77 5.09c.8.34 1.43.55 1.92.7.8.25 1.53.21 2.11.13.65-.1 2-.82 2.28-1.61.28-.79.28-1.47.2-1.61-.08-.15-.31-.23-.65-.4z"/>
        </svg>
    </a>

    <div id="novedades-modal" class="modal-overlay" style="display: none;">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Últimas Novedades</h3>
                <button id="btn-close-modal" class="close-btn">&times;</button>
            </div>
            <div class="modal-body" id="novedades-container">
                </div>
        </div>
    </div>



    <script src="base.js"></script>
    <script src="app.js"></script>
</body>
</html>
